<!DOCTYPE html>
<html lang="om">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jabaa Shop</title>
  <style>
    /* GLOBAL STYLES */
    body { font-family: Arial, sans-serif; margin:0; background:#f9fafb; color:#111; }

    /* HEADER */
    .header { display:flex; justify-content:space-between; align-items:center; padding:1rem 2rem; background:#fff; box-shadow:0 2px 5px rgba(0,0,0,0.1); position:sticky; top:0; z-index:100; }
    .logo { font-weight:bold; font-size:1.5rem; color:#f97316; }
    .search-bar input { padding:0.5rem 1rem; border-radius:8px; border:1px solid #ddd; }
    .header-icons a { margin-left:1rem; text-decoration:none; color:#111; font-weight:bold; }

    /* HERO SECTION */
    .hero { background:#fff; text-align:center; padding:4rem 2rem; }
    .hero h1 { font-size:2.5rem; margin-bottom:1rem; }
    .hero p { font-size:1.1rem; margin-bottom:2rem; }
    .cta-button { background:#f97316; color:#fff; padding:0.75rem 1.5rem; border-radius:12px; text-decoration:none; font-weight:bold; }

    /* PRODUCTS GRID */
    .products-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:1.5rem; padding:2rem; }
    .product-card { background:#fff; border-radius:20px; box-shadow:0 4px 8px rgba(0,0,0,0.08); padding:1rem; text-align:center; transition: transform 0.2s, box-shadow 0.2s; }
    .product-card:hover { transform: translateY(-5px); box-shadow:0 6px 12px rgba(0,0,0,0.15); }
    .product-card img { width:100%; border-radius:12px; margin-bottom:0.75rem; }
    .buy-button { background:#f97316; color:#fff; border:none; border-radius:12px; padding:0.5rem 1rem; cursor:pointer; font-weight:bold; }

    /* FOOTER */
    .footer { background:#fff; text-align:center; padding:2rem; margin-top:2rem; font-size:0.9rem; color:#555; }
    .footer nav a { margin:0 0.5rem; color:#f97316; text-decoration:none; font-weight:bold; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">Jabaa Shop</div>
    <div class="search-bar"><input type="text" placeholder="Kitaaba barbaadi..."></div>
    <div class="header-icons">
      <a href="cart.html">🛒</a>
      <a href="login.html">Seeni</a>
    </div>
  </header>

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="hero-content">
      <h1>Kitaabota Jabaa Argadhu</h1>
      <p>Ogummaa keessan gara fuulduraatti guddisuuf</p>
      <a href="#products" class="cta-button">Kitaabota Ilaali</a>
    </div>
  </section>

  <!-- PRODUCTS GRID -->
  <section id="products" class="products-grid"></section>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2026 Jabaa Shop. Mirgi hunduu seeraan kan eegame dha.</p>
    <nav>
      <a href="faq.html">FAQ</a>
      <a href="security.html">Nageenya</a>
      <a href="support.html">Deeggarsa</a>
      <a href="about.html">Waa'ee Keenya</a>
    </nav>
  </footer>

  <!-- DYNAMIC JS -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const productsGrid = document.getElementById("products");

      // Example: dynamically pull existing ebooks
      // If your system has JS array or Supabase call, replace this with real data
      const ebooks = [
        { title: "Mastering AI", price: "₳ 50", img: "ebooks/example-book.jpg" },
        { title: "Video Editing Pro", price: "₳ 40", img: "ebooks/example-book2.jpg" },
        { title: "Online Business", price: "₳ 60", img: "ebooks/example-book3.jpg" }
      ];

      ebooks.forEach(ebook => {
        const card = document.createElement("div");
        card.classList.add("product-card");
        card.innerHTML = `
          <img src="${ebook.img}" alt="${ebook.title}">
          <h3>${ebook.title}</h3>
          <p>${ebook.price}</p>
          <button class="buy-button">Bitadhu</button>
        `;
        productsGrid.appendChild(card);
      });
    });
  </script>

</body>
</html>

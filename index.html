<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jabaa Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="logo">Jabaa Shop</div>
        <div class="search-bar">
            <input type="text" placeholder="Kitaaba barbaadi...">
        </div>
        <div class="icons">
            <span class="shop-icon">🛒</span>
            <a href="login.html" class="login-btn">Seeni</a>
        </div>
    </header>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="hero-text">
            <h1>Kitaabota Jabaa Argadhu</h1>
            <p>Ogummaa fi barnoota digitaliitti of guddisi</p>
            <a href="#products" class="cta-btn">Kitaabota Ilaali</a>
        </div>
        <div class="hero-image">
            <img src="images/hero-book.png" alt="Featured Ebook">
        </div>
    </section>

    <!-- PRODUCTS GRID -->
    <section id="products" class="product-grid">
        <!-- Products will be dynamically loaded here -->
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 Jabaa Shop. Mirgi hunduu seeraan kan eegame dha.</p>
    </footer>

    <script src="app.js"></script>
    <script>
        // Example: Load products dynamically
        const products = [
            {id: 1, title: "AI Mastery", price: 500, image: "images/book1.jpg"},
            {id: 2, title: "Video Editing Pro", price: 350, image: "images/book2.jpg"},
            {id: 3, title: "Business Online", price: 400, image: "images/book3.jpg"}
        ];

        const productGrid = document.querySelector('.product-grid');
        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${product.image}" alt="${product.title}">
                <h3>${product.title}</h3>
                <p>${product.price} Br</p>
                <button onclick="buyBook(${product.id})">Bitadhu</button>
            `;
            productGrid.appendChild(card);
        });

        function buyBook(id) {
            // Call existing system function
            if(typeof buyEbook === 'function') {
                buyEbook(id);
            } else {
                alert("Bitadhu button activated: Ebook ID " + id);
            }
        }
    </script>
</body>
</html>

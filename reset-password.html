<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furtuu Haaromsuu - Jabaa Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050505] min-h-screen flex items-center justify-center p-6 selection:bg-teal-500/30 font-sans overflow-hidden">
    <!-- Tech Grid Background -->
    <div class="fixed inset-0 tech-grid -z-10 opacity-20"></div>
    <div class="fixed inset-0 -z-10 bg-[radial-gradient(circle_at_50%_50%,rgba(20,184,166,0.1),transparent_70%)]"></div>
    
    <!-- Floating Icons for visual flair -->
    <div class="fixed top-20 left-20 text-teal-500/10 animate-pulse"><i data-lucide="shield-check" class="w-24 h-24"></i></div>
    <div class="fixed bottom-20 right-20 text-blue-500/10 animate-pulse" style="animation-delay: 1s"><i data-lucide="refresh-cw" class="w-32 h-32"></i></div>

    <div class="w-full max-w-sm bg-[#161b2b]/80 backdrop-blur-2xl p-8 rounded-[32px] border border-white/10 shadow-2xl animate-fade-in-up card-3d relative">
        <div class="absolute -top-10 left-1/2 -translate-x-1/2 w-20 h-20 bg-gradient-to-br from-teal-500 to-blue-700 rounded-[24px] flex items-center justify-center logo-teal-glow shadow-2xl border border-white/20">
            <i data-lucide="shopping-bag" class="w-10 h-10 text-white"></i>
        </div>

        <div class="text-center mt-6 mb-8">
            <h1 class="text-2xl font-black tracking-tight text-white mb-2 uppercase">Furtuu Haaromsuu</h1>
            <p class="text-slate-400 text-xs font-medium">Furtuu nageenyaa kee haaraa galchi.</p>
        </div>

        <form id="reset-password-form" class="space-y-4">
            <div class="space-y-1.5">
                <label class="text-[9px] font-bold uppercase tracking-[0.2em] text-teal-400 ml-1">Furtuu Haaraa</label>
                <div class="relative group">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-teal-400 transition-colors">
                        <i data-lucide="lock" class="w-4 h-4"></i>
                    </div>
                    <input type="password" id="new-password" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-12 pr-5 text-white text-xs placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500/50 transition-all" placeholder="••••••••" required minlength="6">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[9px] font-bold uppercase tracking-[0.2em] text-teal-400 ml-1">Furtuu Mirkaneessi</label>
                <div class="relative group">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-teal-400 transition-colors">
                        <i data-lucide="lock" class="w-4 h-4"></i>
                    </div>
                    <input type="password" id="confirm-password" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-12 pr-5 text-white text-xs placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500/50 transition-all" placeholder="••••••••" required minlength="6">
                </div>
            </div>

            <button type="submit" id="reset-btn" class="w-full btn-primary !py-3 shadow-xl shadow-teal-500/20">Furtuu Haaromsi</button>
        </form>

        <div class="mt-8 text-center border-t border-white/5 pt-6">
            <p class="text-slate-500 text-[9px] font-bold uppercase tracking-[0.2em]">
                Gara <a href="login.html" class="text-teal-400 hover:text-teal-300 transition-colors">Galmee Seensaa</a> deebi'i
            </p>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script type="module">
        lucide.createIcons();

        document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                showToast('Furtuun lamaan wal hin fakkaatu!', 'error');
                return;
            }
            
            setLoadingState('reset-btn', true, 'HAAROMSAMA JIRA...');

            const { error } = await supabaseClient.auth.updateUser({
                password: newPassword
            });

            if (error) {
                showToast(error.message, 'error');
                setLoadingState('reset-btn', false);
            } else {
                showToast('Furtuun kee milkaa\'inaan haaromfameera!', 'success');
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 3000);
            }
        });
    </script>
</body>
</html>
